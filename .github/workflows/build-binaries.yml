# .github/workflows/build.yml
name: Build CX_Freeze Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← opt into Node 24 now

permissions:
  contents: write
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: VRChatAvatarScaler
            output-ext: ".AppImage"
          - os: windows-latest
            artifact-name: VRChatAvatarScaler
            output-ext: ".msi"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # --- Python +  CX_Freeze ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install cx_Freeze freeze-core

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libcairo-gobject2 \
            libffi-dev \
            libgtk-3-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libdbus-1-dev \
            libdbus-glib-1-2 \
            libayatana-appindicator3-1 \
            gir1.2-ayatanaappindicator3-0.1 \
            gir1.2-gtk-3.0 \
            python3-gi \
            python3-gi-cairo \
            glib-networking \
            libgirepository-2.0-0 \
            xvfb
          pip install -r requirements.txt
          pip install cx_Freeze freeze-core PyGObject

      - name: Set up virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # --- Rename ---
      - name: Rename File so CX_Freeze works (Linux)
        if: runner.os == 'Linux'
        run: |
          mv vrchat_avatar_scaler.pyw vrchat_avatar_scaler.py
        
      - name: Rename File so CX_Freeze works (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          move vrchat_avatar_scaler.pyw vrchat_avatar_scaler.py

      # --- Build ---
      - name: Build with CX_Freeze (Linux)
        if: runner.os == 'Linux'
        env:
          DISPLAY: ':99'
        run: |
          python setup.py bdist_appimage
        
      - name: Build with CX_Freeze (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python setup.py bdist_msi

      # --- Upload ---
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/VRChatAvatarScaler${{ matrix.output-ext }}
          retention-days: 30

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VRChatAvatarScaler${{ matrix.output-ext }}
